<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8" />

    <title>投票結果</title>
    <link rel="stylesheet" href="css/site.css" />
</head>
<body>
    <header class="site-header">

            <a class="brand" href="index.html">投票系統</a>

    <footer class="site-footer">
        <div class="container">
            <span>候選人與投票紀錄：Google 試算表 ｜ GitHub Pages 靜態版</span>
        </div>

    <script src="js/config.js"></script>
